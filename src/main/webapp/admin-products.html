<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin - Manage Products</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/icons/favicon.png" />
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/iconic/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/linearicons-v1.0.0/icon-font.min.css">
    <link rel="stylesheet" type="text/css" href="vendor/animate/animate.css">
    <link rel="stylesheet" type="text/css" href="vendor/css-hamburgers/hamburgers.min.css">
    <link rel="stylesheet" type="text/css" href="vendor/animsition/css/animsition.min.css">
    <link rel="stylesheet" type="text/css" href="vendor/perfect-scrollbar/perfect-scrollbar.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body class="animsition">

    <!-- Header -->
    <header class="header-v4">
        <div class="container-menu-desktop">

            <div class="wrap-menu-desktop how-shadow1">
                <nav class="limiter-menu-desktop container">
                    <a href="index.html" class="logo">
                        <img src="images/icons/logo-01.png" alt="IMG-LOGO">
                    </a>

                    <div class="menu-desktop">
                        <ul class="main-menu">
                            <li class="active-menu"><a href="admin-products.html">Manage Products</a></li>
                            <li><a href="admin-customers.html">Review Customers</a></li>
                            <li><a href="index.html" target="_blank">View Store</a></li>
                        </ul>
                    </div>

                    <!-- Admin Identity -->
                    <div class="wrap-icon-header flex-w flex-r-m">
                        <span class="stext-106 cl2 p-r-15" style="font-weight: 500;">Welcome, Admin</span>
                        <a href="#" onclick="logout(); return false;" class="stext-106 hov-cl1 trans-04"
                            style="color: #e74c3c;">Logout</a>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Title -->
    <div class="bg0 p-t-60 p-b-20" style="background-color: #f7f7f7;">
        <div class="container">
            <h3 class="ltext-103 cl5 txt-center">
                Product Inventory Management
            </h3>
        </div>
    </div>

    <!-- Content page -->
    <section class="bg0 p-t-20 p-b-116" style="background-color: #f7f7f7;">
        <div class="container">
            <div class="bg0 bor10 p-t-30 p-b-40 p-lr-40 p-lr-15-sm">

                <div class="flex-w flex-sb-m p-b-30">
                    <h4 class="mtext-109 cl2">All Products</h4>
                    <button
                        class="flex-c-m stext-101 cl0 size-112 bg3 bor1 hov-btn3 p-lr-15 trans-04 pointer js-show-add-product"
                        style="max-width: 200px;">
                        + Add New Product
                    </button>
                </div>

                <div class="wrap-table-shopping-cart">
                    <table class="table-shopping-cart">
                        <tr class="table_head">
                            <th class="column-1">Product</th>
                            <th class="column-2">Name</th>
                            <th class="column-3">Price</th>
                            <th class="column-4">Quantity in Stock</th>
                            <th class="column-5">Actions</th>
                        </tr>

                        <tr class="table_row" id="prod-1">
                            <td class="column-1">
                                <div class="how-itemcart1">
                                    <img src="images/item-cart-01.jpg" alt="IMG">
                                </div>
                            </td>
                            <td class="column-2">White Shirt Pleat</td>
                            <td class="column-3">$ 19.00</td>
                            <td class="column-4">
                                <span class="badge badge-success p-lr-10 p-tb-5">45</span>
                            </td>
                            <td class="column-5">
                                <button class="stext-106 cl6 hov1 bor3 trans-04 p-lr-15 p-tb-5 m-r-10 text-primary"
                                    onclick="editProduct(1)">Edit</button>
                                <button class="stext-106 cl6 hov1 bor3 trans-04 p-lr-15 p-tb-5 text-danger"
                                    onclick="removeProduct(1)">Remove</button>
                            </td>
                        </tr>

                        <tr class="table_row" id="prod-2">
                            <td class="column-1">
                                <div class="how-itemcart1">
                                    <img src="images/item-cart-02.jpg" alt="IMG">
                                </div>
                            </td>
                            <td class="column-2">Converse All Star</td>
                            <td class="column-3">$ 39.00</td>
                            <td class="column-4">
                                <span class="badge badge-warning p-lr-10 p-tb-5">5</span>
                            </td>
                            <td class="column-5">
                                <button class="stext-106 cl6 hov1 bor3 trans-04 p-lr-15 p-tb-5 m-r-10 text-primary"
                                    onclick="editProduct(2)">Edit</button>
                                <button class="stext-106 cl6 hov1 bor3 trans-04 p-lr-15 p-tb-5 text-danger"
                                    onclick="removeProduct(2)">Remove</button>
                            </td>
                        </tr>
                    </table>
                </div>

            </div>
        </div>
    </section>

    <!-- Modal: Add / Edit Product -->
    <div class="wrap-modal1 js-modal-product p-t-60 p-b-20">
        <div class="overlay-modal1 js-hide-modal-product"></div>

        <div class="container">
            <div class="bg0 p-t-60 p-b-30 p-lr-15-lg how-pos3-parent bor10">
                <button class="how-pos3 hov3 trans-04 js-hide-modal-product">
                    <img src="images/icons/icon-close.png" alt="CLOSE">
                </button>

                <div class="row px-5">
                    <div class="col-12">
                        <h4 class="mtext-105 cl2 txt-center p-b-30" id="modalProductTitle">
                            Add / Edit Product
                        </h4>

                        <form id="productForm" onsubmit="return saveProduct(event)">
                            <div class="bor8 m-b-20 how-pos4-parent">
                                <input class="stext-111 cl2 plh3 size-116 p-l-20 p-r-30" type="text" id="pName"
                                    placeholder="Product Name" required>
                            </div>

                            <div class="row">
                                <div class="col-sm-6 bor8 m-b-20 how-pos4-parent">
                                    <input class="stext-111 cl2 plh3 size-116 p-l-20 p-r-30" type="number" id="pPrice"
                                        placeholder="Price ($)" required min="0" step="0.01">
                                </div>
                                <div class="col-sm-6 bor8 m-b-20 how-pos4-parent">
                                    <input class="stext-111 cl2 plh3 size-116 p-l-20 p-r-30" type="number"
                                        id="pQuantity" placeholder="Quantity In Stock" required min="0">
                                </div>
                            </div>

                            <div class="bor8 m-b-30">
                                <textarea class="stext-111 cl2 plh3 size-120 p-lr-20 p-tb-25" id="pDesc"
                                    placeholder="Product Description" required></textarea>
                            </div>

                            <button type="submit"
                                class="flex-c-m stext-101 cl0 size-121 bg3 bor1 hov-btn3 p-lr-15 trans-04 pointer">
                                Save Product
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="vendor/animsition/js/animsition.min.js"></script>
    <script src="vendor/bootstrap/js/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $('.js-show-add-product').on('click', function (e) {
            e.preventDefault();
            $('#modalProductTitle').text('Add New Product');
            $('#productForm')[0].reset();
            $('.js-modal-product').addClass('show-modal1');
        });

        $('.js-hide-modal-product').on('click', function () {
            $('.js-modal-product').removeClass('show-modal1');
        });

        function editProduct(id) {
            $('#modalProductTitle').text('Edit Product #' + id);
            // Mock fetching data
            if (id === 1) {
                $('#pName').val('White Shirt Pleat');
                $('#pPrice').val('19.00');
                $('#pQuantity').val('45');
            } else {
                $('#pName').val('Converse All Star');
                $('#pPrice').val('39.00');
                $('#pQuantity').val('5');
            }
            $('.js-modal-product').addClass('show-modal1');
        }

        function removeProduct(id) {
            if (confirm('Are you sure you want to remove this product?')) {
                $('#prod-' + id).fadeOut(300, function () { $(this).remove(); });
                // Async mock to Servlets
                console.log('AJAX Mock: DELETE /api/products/' + id);
            }
        }

        function saveProduct(e) {
            e.preventDefault();
            // Async mock to Servlets for saving
            console.log('AJAX Mock: POST/PUT /api/products');
            alert('Product saved successfully!');
            $('.js-modal-product').removeClass('show-modal1');
            return false;
        }

        function logout() {
            sessionStorage.removeItem('userRole');
            window.location.href = 'sign-in.html';
        }
    </script>
</body>

</html>
